<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Frame Test</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;margin:20px">
<h2>Frame Compositing Test</h2>
<p>Loads frame + test puzzle, applies the compositing algorithm, shows each layer</p>
<div id="log" style="background:#222;padding:8px;margin:8px 0;font-size:13px;min-height:20px"></div>
<div style="display:flex;flex-wrap:wrap;gap:16px">
  <div><h3>Layer 1: Frame with hole</h3><canvas id="c1" width="460" height="200" style="border:1px solid #555;width:460px"></canvas></div>
  <div><h3>Layer 2: Puzzle+texture</h3><canvas id="c2" width="460" height="200" style="border:1px solid #555;width:460px"></canvas></div>
  <div><h3>Final: Composited</h3><canvas id="c3" width="460" height="200" style="border:1px solid #555;width:460px"></canvas></div>
</div>
<div style="margin-top:12px">
  <button onclick="test('h','35片')">横版35片</button>
  <button onclick="test('h','70片')">横版70片</button>
  <button onclick="test('v','35片')">竖版35片</button>
  <button onclick="test('v','70片')">竖版70片</button>
</div>
<script>
const BASE = location.origin + '/puzzle-photo-frame';
const BOUNDS = {
  'h_35片':{left:268,top:230,right:2189,bottom:1691},'h_70片':{left:310,top:244,right:2213,bottom:1697},
  'v_35片':{left:260,top:372,right:1725,bottom:2393},'v_70片':{left:266,top:354,right:1717,bottom:2069},
};
const log = (msg) => document.getElementById('log').textContent += msg + '\n';

function loadImg(src) {
  return new Promise((res,rej) => { const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src; });
}

async function test(orient, size) {
  log(`=== Testing ${orient}_${size} ===`);
  document.getElementById('log').textContent = '';

  const frameUrl = `${BASE}/${orient==='h'?'frames/h':'frames/v'}/${size.replace('片','')}.jpg`;
  log(`Loading frame: ${frameUrl}`);

  // Use a colorful test image (another frame image with different content)
  const puzzleUrl = `${BASE}/${orient==='h'?'frames/v':'frames/h'}/${size.replace('片','')}.jpg`;

  try {
    const frame = await loadImg(frameUrl);
    const puzzle = await loadImg(puzzleUrl);
    log(`Frame: ${frame.naturalWidth}x${frame.naturalHeight}, Puzzle: ${puzzle.naturalWidth}x${puzzle.naturalHeight}`);

    const bounds = BOUNDS[`${orient}_${size}`];
    const fw = frame.naturalWidth, fh = frame.naturalHeight;
    const aspect = fw / fh;

    // Compute preview size
    let pvw, pvh = 200;
    if (aspect > 1) {
      pvw = Math.round(200 * aspect);
      if (pvw > 460) { pvw = 460; pvh = Math.round(460 / aspect); }
    } else {
      pvw = Math.round(200 * aspect);
    }

    log(`Preview size: ${pvw}x${pvh}`);

    const scaleX = pvw / fw, scaleY = pvh / fh;
    const iL = Math.round(bounds.left * scaleX);
    const iT = Math.round(bounds.top * scaleY);
    const iR = Math.round(bounds.right * scaleX);
    const iB = Math.round(bounds.bottom * scaleY);
    const iw = iR - iL, ih = iB - iT;
    log(`Inner area on canvas: ${iw}x${ih} at (${iL},${iT})`);

    // === LAYER 1: Frame with hole ===
    const c1 = document.getElementById('c1');
    c1.width = pvw; c1.height = pvh;
    const ctx1 = c1.getContext('2d');
    ctx1.drawImage(frame, 0, 0, pvw, pvh);
    ctx1.globalCompositeOperation = 'destination-out';
    ctx1.fillRect(iL, iT, iw, ih);
    ctx1.globalCompositeOperation = 'source-over';

    // === LAYER 2: Puzzle + cutting lines ===
    const c2 = document.getElementById('c2');
    c2.width = pvw; c2.height = pvh;
    const ctx2 = c2.getContext('2d');

    // Create the puzzle layer canvas
    const layer = document.createElement('canvas');
    layer.width = iw; layer.height = ih;
    const lCtx = layer.getContext('2d');

    const pW = puzzle.naturalWidth, pH = puzzle.naturalHeight;
    const pAspect = pW / pH, iAspect = iw / ih;

    let dX, dY, dW, dH;
    if (pAspect > iAspect) {
      dW = iw; dH = Math.round(iw / pAspect);
      dX = 0; dY = Math.round((ih - dH) / 2);
    } else {
      dH = ih; dW = Math.round(ih * pAspect);
      dX = Math.round((iw - dW) / 2); dY = 0;
    }

    log(`Cover-fit puzzle: (${dX},${dY},${dW},${dH}) on ${iw}x${ih} layer`);

    lCtx.drawImage(puzzle, 0, 0, pW, pH, dX, dY, dW, dH);

    // Frame inner texture
    const tex = document.createElement('canvas');
    tex.width = iw; tex.height = ih;
    const tCtx = tex.getContext('2d');
    tCtx.drawImage(frame, bounds.left, bounds.top, bounds.right-bounds.left, bounds.bottom-bounds.top, 0, 0, iw, ih);

    lCtx.globalCompositeOperation = 'multiply';
    lCtx.drawImage(tex, 0, 0);
    lCtx.globalCompositeOperation = 'source-over';

    // Draw layer onto c2
    ctx2.drawImage(frame, 0, 0, pvw, pvh);
    ctx2.drawImage(layer, iL, iT);

    // === LAYER 3: Final composited ===
    const c3 = document.getElementById('c3');
    c3.width = pvw; c3.height = pvh;
    const ctx3 = c3.getContext('2d');
    ctx3.drawImage(frame, 0, 0, pvw, pvh);
    ctx3.globalCompositeOperation = 'destination-out';
    ctx3.fillRect(iL, iT, iw, ih);
    ctx3.globalCompositeOperation = 'source-over';
    ctx3.drawImage(layer, iL, iT);

    log('✅ Test complete');

  } catch(e) {
    log('❌ Error: ' + e.message);
  }
}

// Run initial test
test('h','35片');
</script>
</body>
</html>
